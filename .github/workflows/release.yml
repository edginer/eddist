name: Release eddist

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup Rust
        uses: hecrj/setup-rust-action@110f36749599534ca96628b82f52ae67e5d95a3c # v2.0.1
      - name: Load cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        name: Install pnpm
        with:
          run_install: false
          version: "latest"
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: |
            pnpm-lock.yaml
            eddist-server/client-v2/pnpm-lock.yaml
            eddist-admin/client/pnpm-lock.yaml
      - name: Install pnpm dependencies
        run: pnpm install
      - name: Build eddist-client-v2
        run: pnpm -F eddist-client-v2 build
      - name: Build eddist-admin-client
        run: pnpm -F eddist-admin-client build
      - name: Build
        run: cargo build --release
      - name: rm .dockerignore
        run: rm .dockerignore
      - name: Login to Docker registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set docker version tag
        run: echo "VERSION=$(echo ${{ github.ref_name }})" >> $GITHUB_ENV

      - name: Build and push Docker image (eddist)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker-prod/eddist/Dockerfile
          push: true
          tags: |
            ghcr.io/edginer/eddist:${{ env.VERSION }}
      - name: Build and push Docker image (eddist-client)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker-prod/eddist-client/Dockerfile
          push: true
          tags: |
            ghcr.io/edginer/eddist-client:${{ env.VERSION }}
      - name: Build and push Docker image (eddist-admin)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker-prod/eddist-admin/Dockerfile
          push: true
          tags: |
            ghcr.io/edginer/eddist-admin:${{ env.VERSION }}
      - name: Build and push Docker image (eddist-cron)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker-prod/eddist-cron/Dockerfile
          push: true
          tags: |
            ghcr.io/edginer/eddist-cron:${{ env.VERSION }}
      - name: Build and push Docker image (eddist-persistence)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker-prod/eddist-persistence/Dockerfile
          push: true
          tags: |
            ghcr.io/edginer/eddist-persistence:${{ env.VERSION }}
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} --generate-notes
      - name: Notify Discord
        uses: tsickert/discord-webhook@b217a69502f52803de774ded2b1ab7c282e99645 # v7.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          content: |
            **New Release Published!** 🚀
            [Release eddist ${{ github.ref_name }}](https://github.com/edginer/eddist/releases/tag/${{ github.ref_name }})
