name: Check eddist-main

on:
  push:
    branches-ignore:
      - main

jobs:
  check-rust:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup Rust
        uses: hecrj/setup-rust-action@110f36749599534ca96628b82f52ae67e5d95a3c # v2.0.1
      - name: Load cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}
      - name: Clippy check
        run: cargo clippy
      - name: Cargo test
        run: cargo test

  build-client:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        name: Install pnpm
        with:
          run_install: false
          version: "10.12.1"
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache-dependency-path: |
            pnpm-lock.yaml
            eddist-server/client-v2/pnpm-lock.yaml
            eddist-admin/client/pnpm-lock.yaml
      - name: Install pnpm dependencies
        run: pnpm install && pnpm -F eddist-client-v2 install
      - name: Biome check (eddist-admin-client)
        run: pnpm -F eddist-admin-client ci:check
      - name: Biome check (eddist-client-v2)
        run: pnpm -F eddist-client-v2 ci:check
      - name: Check eddist-client-v2
        run: pnpm -F eddist-client-v2 typecheck
      - name: Build eddist-admin-client
        run: pnpm -F eddist-admin-client build
      - name: Check eddist-admin-client
        run: pnpm -F eddist-admin-client typecheck
